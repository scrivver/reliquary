services:
  reliquary:
    image: reliquary:latest
    ports:
      - "${RELIQUARY_PORT:-2080}:2080"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-reliquary}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      THUMBNAIL_WORKERS: ${THUMBNAIL_WORKERS:-4}
      ARCHIVE_AFTER_DAYS: ${ARCHIVE_AFTER_DAYS:-90}
      ARCHIVE_CHECK_HOURS: ${ARCHIVE_CHECK_HOURS:-24}
    volumes:
      - minio_data:/data/minio

volumes:
  minio_data:
